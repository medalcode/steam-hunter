services:
  asf:
    image: justarchi/archisteamfarm:v6.3.6.1
    container_name: asf
    volumes:
      - ./asf-config:/app/config
    environment:
      - ASF_USER=medalcode
      - ASF_HEADLESS=true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:1242/api"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    network_mode: host

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - steam_hunter_data:/app
    environment:
      - LOG_LEVEL=INFO
      - ASF_IPC_URL=http://127.0.0.1:1242
      - ASF_IPC_PASSWORD=${ASF_IPC_PASSWORD:-}
      - ASF_DEFAULT_BOT=${ASF_DEFAULT_BOT:-principal}
      - ASF_AUTO_REDEEM=${ASF_AUTO_REDEEM:-true}
    depends_on:
      - asf
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  steam_hunter_data:
