services:
  asf:
    image: justarchi/archisteamfarm:latest
    container_name: asf
    ports:
      - "127.0.0.1:1242:1242"
    volumes:
      - ./asf-config:/app/config
    environment:
      - ASF_USER=medalcode
      - ASF_HEADLESS=true
    restart: unless-stopped
    network_mode: host

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - steam_hunter_data:/app
    environment:
      - LOG_LEVEL=INFO
      - ASF_IPC_URL=http://127.0.0.1:1242
      - ASF_IPC_PASSWORD=${ASF_IPC_PASSWORD:-}
      - ASF_DEFAULT_BOT=${ASF_DEFAULT_BOT:-principal}
      - ASF_AUTO_REDEEM=${ASF_AUTO_REDEEM:-true}
    depends_on:
      - asf
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  steam_hunter_data:
