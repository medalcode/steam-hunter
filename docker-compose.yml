services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - steam_hunter_data:/app
    environment:
      - LOG_LEVEL=INFO
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  steam_hunter_data:
